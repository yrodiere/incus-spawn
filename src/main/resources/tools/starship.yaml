name: starship
description: Starship cross-shell prompt 1.25.1 with incus-spawn indicator

downloads:
  - url: https://github.com/starship/starship/releases/download/v1.25.1/starship-x86_64-unknown-linux-gnu.tar.gz
    sha256: 4488c11ca632327d1f1f16fb2f102c0646094c35479cd5435991385da43c61ac
    extract: /tmp/starship

run:
  - install -m 755 /tmp/starship/starship /usr/local/bin/starship
  - rm -rf /tmp/starship

files:
  - path: /home/agentuser/.config/starship.toml
    owner: agentuser
    content: |
      [custom.incus_spawn]
      command = 'echo "$ISX_CONTAINER"'
      when = 'test -n "$ISX_CONTAINER"'
      format = "[◆ $output]($style) "
      style = "bold blue"
      description = "incus-spawn container indicator"

run_as_user:
  - echo 'eval "$(starship init bash)"' >> ~/.bashrc

verify: starship --version
